<!-- Connection panel -->
<form (submit)="onSearch(); $event.preventDefault()">
  <div class="rounded-lg border border-edge bg-panel p-5 space-y-5">

    <!-- Section header -->
    <h2 class="text-sm font-semibold text-ink">Connection</h2>

    <!-- Provider selector (static; designed for future multi-provider support) -->
    <div>
      <span class="block text-xs font-medium text-ink-2 mb-2">Provider</span>
      <div class="inline-flex items-center gap-2 px-3 py-2 rounded-md border border-edge bg-ghost text-sm text-ink-2 select-none cursor-default">
        <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12Z"/>
        </svg>
        <span>GitHub</span>
      </div>
    </div>

    <!-- Organization + Token inputs -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <div class="flex items-center h-5 mb-2">
          <label for="organization" class="text-xs font-medium text-ink-2">Organization</label>
        </div>
        <input
          id="organization"
          type="text"
          [value]="organization()"
          (input)="onOrganizationChange($event)"
          placeholder="simp"
          class="w-full bg-ghost border border-edge rounded-md px-3 py-2 text-sm text-ink placeholder:text-ink-3 focus:ring-2 focus:ring-accent focus:outline-none transition duration-200"
        />
      </div>

      <div>
        <div class="flex items-center gap-1.5 h-5 mb-2">
          <label for="token" class="text-xs font-medium text-ink-2">Personal Access Token</label>
          <div class="relative group">
            <button
              type="button"
              class="text-ink-3 cursor-help rounded-full focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent"
              aria-label="Token storage info"
              aria-describedby="token-tooltip"
            >
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <circle cx="12" cy="12" r="10" stroke-width="2"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 16v-4m0-4h.01"/>
              </svg>
            </button>
            <div
              id="token-tooltip"
              role="tooltip"
              class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-56 rounded-md bg-panel border border-edge px-3 py-2 text-xs text-ink-2 shadow-lg opacity-0 group-hover:opacity-100 group-focus-within:opacity-100 pointer-events-none transition-opacity duration-150 z-10"
            >
              Stored for this session only — cleared when the tab is closed.
            </div>
          </div>
        </div>
        <input
          id="token"
          type="password"
          [value]="token()"
          (input)="onTokenChange($event)"
          placeholder="Read-only token (Contents, Metadata, Checks, Pull requests)"
          class="w-full bg-ghost border border-edge rounded-md px-3 py-2 text-sm text-ink placeholder:text-ink-3 focus:ring-2 focus:ring-accent focus:outline-none transition duration-200"
        />
      </div>
    </div>

    <!-- Submit -->
    <div class="flex justify-end">
      <button
        type="submit"
        [disabled]="isLoading() || !formValid()"
        class="px-4 py-2 bg-accent text-white text-sm font-medium rounded-md hover:bg-accent-hover disabled:opacity-50 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-accent transition-colors duration-200"
      >
        @if (isLoading()) {
          <span class="flex items-center gap-2">
            <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24" aria-hidden="true">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
            </svg>
            Fetching…
          </span>
        } @else {
          Scan modules
        }
      </button>
    </div>

  </div>
</form>
